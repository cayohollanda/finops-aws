name: Deploy Backend (Railway)

on:
  push:
    branches: [main]
    paths: [backend/**]
  pull_request:
    branches: [main]
    paths: [backend/**]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: backend
        run: npm install

      - name: Build (TypeScript)
        working-directory: backend
        run: npm run build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Railway CLI
        run: |
          RAILWAY_VERSION=4.40.0
          curl -fsSL "https://github.com/railwayapp/cli/releases/download/v${RAILWAY_VERSION}/railway-v${RAILWAY_VERSION}-x86_64-unknown-linux-musl.tar.gz" -o railway.tar.gz
          tar -xzf railway.tar.gz
          sudo mv railway /usr/local/bin/railway
          railway --version

      - name: Deploy to Railway
        working-directory: backend
        run: railway up --detach --ci --service ecd11c28-d705-4b87-b907-59e2317c5514
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
